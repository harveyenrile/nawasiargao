<!doctype html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A quiet guesthouse in General Luna, Siargao — 5 minutes from Cloud 9. Private ensuite rooms with Starlink wifi, AC, and a veranda. Ideal for surfers and slow travelers." />
    <title>Nawa House — Guesthouse in Siargao, Philippines</title>
    <link rel="canonical" href="https://nawahouse.ph/" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nawahouse.ph/" />
    <meta property="og:site_name" content="Nawa House" />
    <meta property="og:title" content="Nawa House — Guesthouse in Siargao, Philippines" />
    <meta property="og:description" content="A quiet guesthouse in General Luna, Siargao — 5 minutes from Cloud 9. Private ensuite rooms with Starlink wifi, AC, and a veranda." />
    <meta property="og:image" content="https://nawahouse.ph/hero/hero-slide-1.jpg" />
    <meta property="og:locale" content="en_PH" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nawa House — Guesthouse in Siargao, Philippines" />
    <meta name="twitter:description" content="A quiet guesthouse in General Luna, Siargao — 5 minutes from Cloud 9." />
    <meta name="twitter:image" content="https://nawahouse.ph/hero/hero-slide-1.jpg" />

    <!-- LCP preload -->
    <link rel="preload" as="image" href="/hero/hero-slide-1.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Parkinsans:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LodgingBusiness",
      "name": "Nawa House",
      "description": "A quiet guesthouse in General Luna, Siargao. Private ensuite rooms with Starlink wifi, air conditioning, and a private veranda. 5 minutes from Cloud 9.",
      "url": "https://nawahouse.ph",
      "logo": "https://nawahouse.ph/logo-dark.png",
      "image": "https://nawahouse.ph/hero/hero-slide-1.jpg",
      "email": "hello@nawahouse.ph",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "General Luna",
        "addressLocality": "General Luna",
        "addressRegion": "Siargao Island",
        "addressCountry": "PH"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 9.8657,
        "longitude": 126.1271
      },
      "priceRange": "$$",
      "amenityFeature": [
        { "@type": "LocationFeatureSpecification", "name": "Air conditioning", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Free WiFi (Starlink)", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Private ensuite bathroom", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Private veranda", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Work desk", "value": true },
        { "@type": "LocationFeatureSpecification", "name": "Mini refrigerator", "value": true }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "reviewCount": "71",
        "bestRating": "5"
      },
      "sameAs": [
        "https://www.instagram.com/nawasiargao",
        "https://www.airbnb.com/h/nawasunsetroom"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
